spring:
  application:
    name: user-center

  # DataSource Config
  datasource:
    url: jdbc:mysql://localhost:3306/user_center?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 10086

springdoc:
  api-docs:
    path: /v3/api-docs        # OpenAPI JSON 地址
  swagger-ui:
    path: /swagger-ui.html    # 原生 swagger-ui
knife4j:
  enable: true                # knife4j 增强 UI：访问 http://localhost:10086/doc.html
